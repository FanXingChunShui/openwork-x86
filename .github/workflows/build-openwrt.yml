name: Build OpenWrt x86/64 Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      make_kernel_config:
        description: 'Run make kernel_config'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 2 * * 0'

env:
  OPENWRT_VERSION: 'openwrt-25.12'
  OPENWRT_REPO: 'https://github.com/openwrt/openwrt.git'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Prepare ccache
        run: |
          mkdir -p ~/.cache/ccache
          echo "max_size = 10G" > ~/.cache/ccache/ccache.conf
          echo "compression = true" >> ~/.cache/ccache/ccache.conf

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: openwrt-ccache-${{ runner.os }}-${{ hashFiles('**/build-openwrt.yml') }}
          restore-keys: |
            openwrt-ccache-${{ runner.os }}-

      - name: Clone OpenWrt ${{ env.OPENWRT_VERSION }}
        run: |
          git clone --branch=${{ env.OPENWRT_VERSION }} ${{ env.OPENWRT_REPO }} openwrt

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir/toolchain*
          key: buildcache-${{ runner.os }}-${{ env.OPENWRT_VERSION }}-${{ hashFiles('.github/workflows/build-openwrt.yml') }}
          restore-keys: |
            buildcache-${{ runner.os }}-${{ env.OPENWRT_VERSION }}-
            buildcache-${{ runner.os }}-

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a

      - name: Add helloworld feed
        run: |
          cd openwrt
          git clone --depth=1 https://github.com/fw876/helloworld.git feeds/helloworld
          ./scripts/feeds update helloworld
          ./scripts/feeds install -a -p helloworld

      - name: Install ddns and openvpn packages
        run: |
          cd openwrt
          ./scripts/feeds install luci-app-ddns ddns-scripts openvpn luci-app-openvpn

      - name: Configure build
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_generic=y

          # IPv6 support
          CONFIG_IPV6=y
          CONFIG_PACKAGE_ipv6=y
          CONFIG_PACKAGE_kmod-ip6tables=y
          CONFIG_PACKAGE_kmod-ipv6=y
          CONFIG_PACKAGE_kmod-ipt-nat6=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_6in4=y
          CONFIG_PACKAGE_6rd=y
          CONFIG_PACKAGE_6to4=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_ip6tables-extra=y
          CONFIG_PACKAGE_ip6tables-nat=y

          # OpenVPN
          CONFIG_PACKAGE_openvpn=y
          CONFIG_PACKAGE_openvpn-easy-rsa=y
          CONFIG_PACKAGE_luci-app-openvpn=y
          CONFIG_PACKAGE_luci-app-openvpn-unbound=y

          # PassWall2
          CONFIG_PACKAGE_passwall2=y
          CONFIG_PACKAGE_luci-app-passwall2=y
          CONFIG_PACKAGE_luci-app-passwall=y
          EOF
          make defconfig

      - name: Create custom files for network config
        run: |
          mkdir -p openwrt/files/etc/config
          cat > openwrt/files/etc/config/network << 'EOF'
          config interface 'loopback'
            option device 'lo'
            option proto 'static'
            option ipaddr '127.0.0.1'
            option netmask '255.0.0.0'

          config device
            option name 'br-lan'
            option type 'bridge'
            list ports 'eth0'

          config interface 'lan'
            option device 'br-lan'
            option proto 'static'
            option ipaddr '192.168.10.251'
            option netmask '255.255.255.0'
            option gateway '192.168.10.1'
            list dns '8.8.8.8'
            list dns '114.114.114.114'
            # IPv6
            option ip6addr 'fd00:192:168:10::251/64'
            option ip6gw 'fd00:192:168:10::1'
            list ip6dns '2001:4860:4860::8888'
            list ip6dns '2001:4860:4860::8844'

          config interface 'wan6'
            option device 'eth1'
            option proto 'dhcpv6'
            option reqaddress 'try'
            option reqprefix 'auto'
          EOF
          cat > openwrt/files/etc/config/dhcp << 'EOF'
          config dhcp 'lan'
            option interface 'lan'
            option start '100'
            option limit '150'
            option leasetime '12h'
            option dhcp_option '6,192.168.10.1'
            # IPv6
            option ra 'server'
            option dhcpv6 'server'
            option nat '1'
            list ra_flags 'server'

          config dhcp 'wan6'
            option interface 'wan6'
            option dhcpv6 'server'
            option ra 'server'
            option nat '1'
            list ra_flags 'server'
          EOF
          cat > openwrt/files/etc/config/firewall << 'EOF'
          config defaults
            option syn_flood '1'
            option input 'ACCEPT'
            option output 'ACCEPT'
            option forward 'REJECT'

          config zone
            option name 'lan'
            option network 'lan'
            option input 'ACCEPT'
            option output 'ACCEPT'
            option forward 'ACCEPT'

          config zone
            option name 'wan'
            option network 'wan wan6'
            option input 'REJECT'
            option output 'ACCEPT'
            option forward 'REJECT'
            option masq '1'
            option mtu_fix '1'

          config forwarding
            option src 'lan'
            option dest 'wan'

          config rule
            option name 'Allow-ICMPv6-Input'
            option src 'wan'
            option proto 'icmp'
            option icmp_type 'echo-request echo-reply router-advertisement router-solicitation destination-unreachable packet-too-big time-exceeded bad-header unknown-header-type'
            option limit '1000/sec'
            option family 'ipv6'
            option target 'ACCEPT'

          config rule
            option name 'Allow-ICMPv6-Forward'
            option src 'wan'
            option dest 'lan'
            option proto 'icmp'
            option icmp_type 'echo-request echo-reply router-advertisement router-solicitation destination-unreachable packet-too-big time-exceeded bad-header unknown-header-type'
            option limit '1000/sec'
            option family 'ipv6'
            option target 'ACCEPT'

          config rule
            option name 'Allow-Masquerading'
            option src 'wan'
            option dest 'lan'
            option proto 'all'
            option target 'MASQUERADE'
            option family 'ipv6'
          EOF

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Prepare artifacts
        run: |
          cd openwrt
          find bin/targets/x86 -name "*.img.gz" -type f | head -5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: openwrt-x86-64-firmware-${{ github.run_number }}
          path: |
            openwrt/bin/targets/x86/**/*.img.gz
            openwrt/bin/targets/x86/**/*.bin
          retention-days: 14
          if-no-files-found: error

      - name: Upload ccache statistics
        if: always()
        run: |
          ccache -s

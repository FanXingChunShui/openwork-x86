name: Build OpenWrt 25.12

on:
  push:
    branches:
      - main
      - master
  schedule:
    # 每周一凌晨 2:00 UTC 自动编译
    - cron: "0 2 * * 1"

  workflow_dispatch:
    inputs:
      threads:
        description: 'Number of compile threads'
        required: false
        default: '4'
        type: string
      jobs:
        description: 'Number of parallel make jobs'
        required: false
        default: '4'
        type: string

env:
  OPENWRT_VERSION: "openwrt-25.12"
  OPENWRT_REPO: "https://github.com/openwrt/openwrt.git"
  MGMT_IP: "192.168.10.251"
  DEBIAN_FRONTEND: "noninteractive"
  TZ: "Asia/Shanghai"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow (for patches)
        uses: actions/checkout@v4
        with:
          path: workflow-src

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses-dev libssl-dev \
            libtool make patch python3 python3-dev python3-pip \
            rsync subversion swig unzip zlib1g-dev file wget \
            ccache asciidoc bc bzip2 fastjar libelf-dev \
            intltool libglib2.0-dev libpcre3-dev libxml2-dev \
            libxslt-dev ncurses-dev procps time \
            xsltproc coccinelle libpcap-dev \
            autoconf automake autopoint curl help2man imagemagick \
            texinfo texlive-base texi2html tidy \

      - name: Clone OpenWrt ${{ env.OPENWRT_VERSION }}
        run: |
          git clone --depth=1 --branch v${{ env.OPENWRT_VERSION }} \
            ${{ env.OPENWRT_REPO }} openwrt-build

      - name: Add Passwall2 feed
        run: |
          cd openwrt-build
          # Add passwall2 feed
          echo "src-git passwall2 https://github.com/Openwrt-Passwall/openwrt-passwall2" >> feeds.conf.default
          # Add extra feeds for dependencies
          echo "src-git luci https://github.com/openwrt/luci.git" >> feeds.conf.default

      - name: Update feeds
        run: |
          cd openwrt-build
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p passwall2

      - name: Apply custom configuration
        run: |
          cd openwrt-build

          # --- Global config ---
          cat >> .config << 'EOF'

          # IPv6 support
          CONFIG_IPV6=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_ip6tables-extra=y
          CONFIG_PACKAGE_ip6tables-mod-nat=y
          CONFIG_PACKAGE_ipv6helper=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y
          CONFIG_PACKAGE_ds-lite=y
          CONFIG_PACKAGE_6in4=y
          CONFIG_PACKAGE_6rd=y
          CONFIG_PACKAGE_map-arm=y
          CONFIG_PACKAGE_tayga=y

          # OpenVPN
          CONFIG_PACKAGE_openvpn-openssl=y
          CONFIG_PACKAGE_openvpn-easy-rsa=y
          CONFIG_PACKAGE_luci-app-openvpn=y
          CONFIG_PACKAGE_luci-app-openvpn-server=y

          # Passwall2
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-passwall2=y
          CONFIG_PACKAGE_passwall2=y
          CONFIG_PACKAGE_iptables-mod-tproxy=y
          CONFIG_PACKAGE_ip-full=y

          # Network / Admin
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-proto-wireguard=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_openssl-util=y

          # Image generation
          CONFIG_TARGET_ROOTFS_EXT4FS_SIZE=4000
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          EOF

      - name: Enable IPv6 in UCI network config template
        run: |
          cd openwrt-build
          mkdir -p files/etc/config
          cat > files/etc/config/network << 'NETEOF'
          config interface 'loopback'
              option device 'lo'
              option proto 'static'
              option ipaddr '127.0.0.1'
              option netmask '255.0.0.0'

          config interface 'lan'
              option device 'br-lan'
              option proto 'static'
              option ipaddr '192.168.10.251'
              option netmask '255.255.255.0'
              option ip6assign '64'

          config interface 'wan'
              option device 'eth0'
              option proto 'dhcp'

          config interface 'wan6'
              option device 'eth0'
              option proto 'dhcpv6'

          config device
              option name 'br-lan'
              option type 'bridge'
              list ports 'lan'
          NETEOF

      - name: Enable IPv6 in firewall config
        run: |
          cd openwrt-build
          cat > files/etc/config/firewall << 'FWEOF'
          config defaults
              option input 'ACCEPT'
              option output 'ACCEPT'
              option forward 'ACCEPT'
              option synflood_protect '1'

          config zone
              option name 'lan'
              list network 'lan'
              option input 'ACCEPT'
              option output 'ACCEPT'
              option forward 'ACCEPT'

          config zone
              option name 'wan'
              list network 'wan'
              list network 'wan6'
              option input 'ACCEPT'
              option output 'ACCEPT'
              option forward 'ACCEPT'
              option masq '1'
              option mtu_fix '1'

          config forwarding
              option src 'lan'
              option dest 'wan'
          FWEOF

      - name: Pre-configure (defconfig + menuconfig)
        run: |
          cd openwrt-build
          # First pass: defconfig to resolve dependencies
          make defconfig
          # Second pass: apply our .config and resolve dependencies
          make config

      - name: Build OpenWrt
        run: |
          cd openwrt-build
          make -j${{ inputs.jobs || '4' }} \
            V=s \
            DOWNLOAD_TIMEOUT=30 \
            MAKEFLAGS=-j${{ inputs.threads || '4' }}

      - name: Collect artifacts
        run: |
          cd openwrt-build
          mkdir -p artifacts
          find bin/targets -name "*.img" -o -name "*.bin" -o -name "*.ext4" | head -20 | while read f; do
            cp "$f" artifacts/
          done
          find bin/packages -name "*.ipk" | tar -czf artifacts/packages.tar.gz -T -
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.OPENWRT_VERSION }}-firmware
          path: openwrt-build/artifacts/
          retention-days: 7
